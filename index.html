<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Söz mü?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <h1 id="soru">Yarın erken uyanacağına söz veriyor musun?</h1>
        
        <div class="buttons">
            <button id="evetBtn" onclick="evetDediler()">Evet</button>
            <button id="hayirBtn" onmouseover="kac()">Hayır</button>
        </div>

        <div id="kalpAlani"></div>
    </div>

    <script>
        // Hayır butonunu kaçıran fonksiyon
        function kac() {
            const btn = document.getElementById('hayirBtn');
            // Ekranın rastgele bir yerine gönderir
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            
            btn.style.position = "absolute";
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        // Evet butonuna basınca kalp çıkaran fonksiyon
        function evetDediler() {
            document.getElementById('soru').innerText = "Sözünü aldım!";
            document.querySelector('.buttons').style.display = "none";
            
            const kalp = document.getElementById('kalpAlani');
            // Sadece 'w' harflerinden oluşan büyük bir kalp tasarımı
            kalp.innerHTML = `
                <pre style="color: red; font-weight: bold; font-size: 20px; line-height: 15px;">
      wwwwwwwww       wwwwwwwww
    wwwwwwwwwwwwwww wwwwwwwwwwwwwww
   wwwwwwwwwwwwwwwwwwwwwwwwwwwwwwwww
   wwwwwwwwwwwwwwwwwwwwwwwwwwwwwwwww
   wwwwwwwwwwwwwwwwwwwwwwwwwwwwwwwww
    wwwwwwwwwwwwwwwwwwwwwwwwwwwwwww
      wwwwwwwwwwwwwwwwwwwwwwwwwww
        wwwwwwwwwwwwwwwwwwwwwww
          wwwwwwwwwwwwwwwwwww
            wwwwwwwwwwwwwww
              wwwwwwwwwww
                wwwwwww
                  www
                   w
                </pre>`;
        }
    </script>
</body>
</html>
