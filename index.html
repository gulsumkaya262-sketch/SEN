<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEYSEL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <h1 id="soru">sende beni seviyonmu kurban olduğum</h1>
        
        <div class="buttons">
            <button id="evetBtn" onclick="evetDediler()">seviyom niye sordun bu cevabı</button>
            <button id="hayirBtn" onmouseover="kac()">hayır</button>
        </div>

        <div id="kalpAlani"></div>
    </div>

    <script>
        // Hayır butonunu kaçıran fonksiyon (aynı kaldı)
        function kac() {
            const btn = document.getElementById('hayirBtn');
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            
            btn.style.position = "absolute";
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        // Evet butonuna basınca ateşli kalbi çıkaran fonksiyon
        function evetDediler() {
            document.getElementById('soru').innerText = "SENİ ÇOK SEVİYORUM ";
            document.querySelector('.buttons').style.display = "none";
            
            const kalpAlani = document.getElementById('kalpAlani');
            
            // Profesyonel, pürüzsüz SVG Kalp ve Ateş Efekti
            kalpAlani.innerHTML = `
                <div class="fire-heart-container">
                    <svg class="fire-heart" viewBox="0 0 32 32">
                        <path d="M16 28.5s-12-7.22-12-14.93C4 8.78 8.03 5 12 5c2.4 0 4.28 1.47 5 3.33C17.72 6.47 19.6 5 22 5c3.97 0 8 3.78 8 8.57 0 7.71-12 14.93-12 14.93z"/>
                    </svg>
                    <div class="flame"></div>
                </div>
            `;
        }
    </script>
</body>
</html>
